name: '🚀 ساخت کداسپیس و دریافت لینک VLESS'

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: نصب jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: ایجاد کداسپیس
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "⏳ در حال ساخت کداسپیس (حداکثر ۲ دقیقه)..."
          CODESPACE_NAME=$(gh codespace create -r ${{ github.repository }} -m 2-core --display-name "MRH-Proxy" --status | jq -r '.name')
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV
          echo "✅ کداسپیس با نام $CODESPACE_NAME ساخته شد."

      - name: منتظر راه‌اندازی سرویس‌ها
        run: sleep 30  # فقط چند ثانیه برای شروع اولیه

      - name: دریافت لینک VLESS از لاگ کداسپیس (با انتظار پویا)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🔍 در حال جستجوی لینک VLESS..."
          MAX_WAIT=300
          INTERVAL=10
          ELAPSED=0
          VLESS_LINK=""
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            VLESS_LINK=$(gh codespace logs -c ${{ env.CODESPACE_NAME }} 2>&1 | grep -oE 'vless://[^ ]+' | head -1)
            if [ -n "$VLESS_LINK" ]; then
              echo "✅ لینک پیدا شد بعد از ${ELAPSED} ثانیه."
              break
            fi
            echo "⏳ منتظر آماده‌سازی... ${ELAPSED}s / ${MAX_WAIT}s"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ -z "$VLESS_LINK" ]; then
            echo "❌ خطا: پس از ${MAX_WAIT} ثانیه لینک پیدا نشد."
            exit 1
          fi
          echo "VLESS_LINK=$VLESS_LINK" >> $GITHUB_ENV

      - name: نمایش لینک به کاربر
        run: |
          echo "🎉 لینک VLESS شما:"
          echo "${{ env.VLESS_LINK }}"

      - name: ذخیره توکن در کداسپیس (برای Idle Monitor)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh codespace exec -c ${{ env.CODESPACE_NAME }} -- bash -c "echo '$GH_TOKEN' > ~/.gh_token && chmod 600 ~/.gh_token"
          echo "✅ توکن ذخیره شد."

      - name: نگه داشتن کداسپیس فعال
        run: |
          echo "✅ کداسپیس فعال نگه داشته شد."
